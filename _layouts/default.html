<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Cyber Grid Background -->
  <div class="cyber-grid"></div>
  <div class="cyber-scanlines"></div>
  
  <!-- Header -->
  <header class="cyber-header">
    <div class="header-content">
      <h1 class="cyber-title">
        <span class="glitch-text">{{ site.title }}</span>
      </h1>
      <nav class="cyber-nav">
        <ul>
          <li><a href="{{ "/" | relative_url }}" class="nav-link">Home</a></li>
          <li><a href="{{ "/about/" | relative_url }}" class="nav-link">About</a></li>
          <li><a href="{{ "/categories/" | relative_url }}" class="nav-link">Categories</a></li>
          <li><a href="{{ "/tags/" | relative_url }}" class="nav-link">Tags</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="cyber-main">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="cyber-footer">
    <div class="footer-content">
      <p class="neon-text">&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Built with Jekyll.</p>
      <div class="social-links">
        <a href="https://github.com/{{ site.github_username }}" class="social-link">GitHub</a>
        <a href="https://twitter.com/{{ site.twitter_username }}" class="social-link">Twitter</a>
      </div>
    </div>
  </footer>

  <!-- Neon Cursor -->
  <div class="neon-cursor"></div>

  <script src="{{ "/assets/js/script.js" | relative_url }}"></script>
</body>
</html>
