---
layout: default
---

<article class="post-content">
  <h1 class="page-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }} | {{ page.categories | join: ', ' }}</p>
  
  <div class="post-tags">
    {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
  
  {{ content }}
</article>
